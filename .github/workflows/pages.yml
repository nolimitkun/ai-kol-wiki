name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material mkdocs-literate-nav

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: false  # 依赖用 PEP 723 内联声明，无 uv.lock/requirements 可缓存

      - name: Refresh README stats
        run: uv run scripts/stats.py

      - name: Commit refreshed stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "统计无变化，跳过提交"
          else
            git commit -m "chore: 刷新 README 数据统计 [skip ci]"
            git push
          fi

      - name: Assemble docs (preserve repo-relative links)
        run: |
          mkdir -p _docs
          cp -r wiki sources _docs/
          cp CLAUDE.md watchlist.yaml _docs/
          cp README.md _docs/index.md

      - name: Generate sidebar nav (Videos grouped by channel)
        run: uv run scripts/gen_nav.py _docs/SUMMARY.md

      - name: Build site
        run: mkdocs build --site-dir _site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
